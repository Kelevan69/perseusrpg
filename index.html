<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Герой поневоле — прототип v5</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a0f08; color: #e6d5b8; margin: 20px; }
        #game { max-width: 760px; margin: auto; border: 3px solid #8b5a2b; padding: 20px; background: #2c1e14; }
        #status { background: #1a0f08; padding: 15px; border: 2px solid #8b5a2b; margin-bottom: 15px; font-size: 15px; line-height: 1.6; }
        #log { height: 400px; overflow-y: auto; background: #0f0a05; padding: 15px; border: 1px solid #8b5a2b; margin-bottom: 15px; line-height: 1.55; }
        button { margin: 6px 4px; padding: 12px 18px; background: #8b5a2b; color: #e6d5b8; border: none; cursor: pointer; font-size: 15px; }
        button:hover { background: #a67c52; }
        input { width: 68%; padding: 10px; margin: 8px 0; font-size: 15px; }
        .npc { color: #ffcc77; }
        .system { color: #88cc88; }
        .error { color: #ff8888; }
        .status-value { color: #ffdd88; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game">
        <h1>Герой поневоле</h1>
        
        <div id="status">
            <strong>Твоё состояние:</strong><br>
            💰 Золото: <span id="gold" class="status-value">15</span> монет &nbsp;&nbsp;&nbsp;
            ❤️ Самочувствие: <span id="hp" class="status-value">85</span>/100 &nbsp;&nbsp;&nbsp;
            🏆 Героизм: <span id="heroism" class="status-value">15</span>/100
        </div>

        <div id="log"></div>

        <div>
            <button onclick="lookAround()">Осмотреться</button>
            <button onclick="talkToGrom()">Поговорить с Громом</button>
            <button onclick="randomEvent()">Случайное событие</button>
        </div>

        <div id="chatArea" style="display:none; margin-top:20px;">
            <input type="text" id="playerInput" placeholder="Что сказать Грому...">
            <button onclick="sendMessageToGrom()">Сказать</button>
            <button onclick="endChat()">Закончить разговор</button>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6KCRjWmHgx9qMsM6VdDAaHcLlFy1K0XcSNUnSz3pg6K1Q";   // ← ВСТАВЬ СВОЙ КЛЮЧ
        const MODEL = "gemini-2.5-flash-lite";

        let conversationHistory = [];
        let playerState = {
            gold: 15,
            hp: 85,        // Самочувствие
            heroism: 15
        };

        const systemPrompt = `Ты — Бармен Гром, циничный бывший наёмник с чёрным юмором в стиле Терри Пратчетта. 
Отвечай коротко, с сарказмом, иногда подкалывай.`;

        function addLog(text, className = "") {
            const log = document.getElementById("log");
            const p = document.createElement("p");
            p.innerHTML = text;
            if (className) p.className = className;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus() {
            document.getElementById("gold").textContent = playerState.gold;
            document.getElementById("hp").textContent = playerState.hp;
            document.getElementById("heroism").textContent = playerState.heroism;
        }

        async function askGemini(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.9, maxOutputTokens: 450 }
                    })
                });

                if (!response.ok) return "Гром молча отвернулся...";

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                return text && text.length > 5 ? text : "Гром что-то буркнул...";
            } catch (err) {
                return "Магия не сработала...";
            }
        }

        // Случайное событие с реальным изменением состояния
        async function randomEvent() {
            addLog("<strong>→ Случайное событие...</strong>", "system");

            const prompt = `Придумай короткое забавное или абсурдное событие в трактире в стиле фэнтези с чёрным юмором (Пратчетт).
Игрок имеет ${playerState.gold} монет, самочувствие ${playerState.hp}/100, героизм ${playerState.heroism}.
Опиши событие в 2-4 предложения.
В конце обязательно напиши в формате:
ИЗМЕНЕНИЯ: золото +X или -Y, самочувствие +A или -B, героизм +C или -D
Где X,Y,A,B,C,D — небольшие числа (от -15 до +10).`;

            const result = await askGemini(prompt);
            addLog(result);

            // Парсим изменения из ответа ИИ
            const changeMatch = result.match(/ИЗМЕНЕНИЯ:\s*(.*)/i);
            if (changeMatch) {
                const changes = changeMatch[1].toLowerCase();
                
                // Золото
                const goldMatch = changes.match(/золото\s*([+-]?\d+)/);
                if (goldMatch) playerState.gold = Math.max(0, playerState.gold + parseInt(goldMatch[1]));

                // Самочувствие
                const hpMatch = changes.match(/самочувствие\s*([+-]?\d+)/);
                if (hpMatch) playerState.hp = Math.max(0, Math.min(100, playerState.hp + parseInt(hpMatch[1])));

                // Героизм
                const heroismMatch = changes.match(/героизм\s*([+-]?\d+)/);
                if (heroismMatch) playerState.heroism = Math.max(0, Math.min(100, playerState.heroism + parseInt(heroismMatch[1])));

                updateStatus();
            }
        }

        function lookAround() {
            addLog("<strong>Ты осмотрелся:</strong> Дымный трактир, пахнет кислым элем. Гром лениво протирает кружку. В углу кто-то храпит.", "system");
        }

        function talkToGrom() {
            document.getElementById("chatArea").style.display = "block";
            addLog('<span class="npc"><strong>Гром:</strong> Ну чё, «герой», опять нажрался или уже мир спасать собрался?</span>');
            conversationHistory = [];
        }

        async function sendMessageToGrom() {
            const input = document.getElementById("playerInput");
            const message = input.value.trim();
            if (!message) return;

            addLog(`<strong>Ты:</strong> ${message}`);
            input.value = "";

            conversationHistory.push(`Игрок: ${message}`);

            const fullPrompt = `${systemPrompt}\n\nСостояние игрока: ${playerState.gold} золота, самочувствие ${playerState.hp}, героизм ${playerState.heroism}.\nРазговор:\n${conversationHistory.join("\n")}\nГром:`;

            const reply = await askGemini(fullPrompt);
            addLog(`<span class="npc"><strong>Гром:</strong> ${reply}</span>`);

            conversationHistory.push(`Гром: ${reply}`);
            if (conversationHistory.length > 12) conversationHistory = conversationHistory.slice(-12);

            // Иногда Гром даёт монетку или подкалывает
            if (Math.random() > 0.65) {
                playerState.heroism = Math.min(100, playerState.heroism + 4);
                updateStatus();
            }
        }

        function endChat() {
            document.getElementById("chatArea").style.display = "none";
            addLog("<em>Ты отошёл от стойки.</em>", "system");
        }

        window.onload = () => {
            updateStatus();
            addLog("Прототип v5 запущен. Теперь события реально меняют твоё состояние!", "system");
            addLog("Попробуй «Случайное событие» несколько раз.", "system");
        };
    </script>
</body>
</html>
