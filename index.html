<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚔️ Perseus RPG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0f0f2a 100%); color: #e0e0ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 1rem; position: relative; overflow-x: hidden; }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.8); border-radius: 50%; animation: twinkle 2s infinite ease-in-out; }
    @keyframes twinkle { 0%,100%{opacity:0.3;transform:scale(1);} 50%{opacity:1;transform:scale(1.2);} }
    #start-menu { text-align: center; z-index: 10; animation: fadeIn 0.8s ease-out; max-width: 500px; width: 100%; margin-top: 10vh; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #title { font-size: 3rem; font-weight: bold; margin-bottom: 0.5rem; background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4, #ffd700); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientShift 4s ease infinite; }
    @keyframes gradientShift { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }
    #subtitle { font-size: 1.1rem; color: #aaa; margin-bottom: 2rem; font-style: italic; }
    .menu-btn { display: block; width: 100%; max-width: 300px; margin: 10px auto; padding: 16px 24px; background: linear-gradient(135deg, #4a55ff, #6a7aff); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(74,85,255,0.4); }
    .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(74,85,255,0.6); }
    .menu-btn.secondary { background: linear-gradient(135deg, #2a2a4a, #3a3a5a); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .menu-btn.secondary:hover { background: linear-gradient(135deg, #3a3a5a, #4a4a6a); }
    .menu-btn.danger { background: linear-gradient(135deg, #ff4757, #ff6b7a); }
    .menu-btn.danger:hover { background: linear-gradient(135deg, #ff6b7a, #ff8fa3); box-shadow: 0 8px 30px rgba(255,71,87,0.5); }
    #game-ui { display: none; z-index: 10; max-width: 800px; width: 100%; animation: slideUp 0.5s ease-out; margin-top: 1rem; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    #stats { background: linear-gradient(135deg, #1a1a2e, #252542); padding: 12px 16px; border-radius: 10px; margin-bottom: 1rem; display: flex; justify-content: space-around; font-weight: 600; border: 1px solid rgba(106,90,249,0.3); flex-wrap: wrap; gap: 8px; }
    #stats span { color: #ffd700; }
    #map-view { margin-bottom: 1rem; }
    .map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .map-node { padding: 14px; border-radius: 8px; border: 2px solid #333; background: #1a1a2e; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .map-node.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
    .map-node.available { border-color: #4a55ff; box-shadow: 0 0 10px rgba(74,85,255,0.3); }
    .map-node.available:hover { transform: translateY(-2px); background: #222244; }
    .map-node.current { border-color: #ffd700; background: #2a2a4a; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
    .map-node.visited { border-color: #4ecdc4; opacity: 0.75; }
    .node-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
    .node-label { font-weight: 600; margin-bottom: 4px; }
    .node-status { font-size: 0.75rem; color: #888; }
    #event-view { display: none; background: linear-gradient(135deg, #1a1a2e, #252542); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; border-left: 4px solid #6a5af9; min-height: 120px; }
    #event-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 1rem; white-space: pre-line; }
    #event-actions { display: flex; flex-direction: column; gap: 10px; }
    .event-btn { display: block; width: 100%; padding: 12px; background: linear-gradient(135deg, #4a55ff, #5a65ff); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: all 0.2s; }
    .event-btn:hover { background: linear-gradient(135deg, #5a65ff, #6a7aff); transform: translateX(4px); }
    #menu-toggle { position: fixed; top: 15px; right: 15px; padding: 10px 16px; background: rgba(26,26,46,0.9); border: 1px solid rgba(106,90,249,0.5); color: #aaa; border-radius: 8px; cursor: pointer; font-size: 0.9rem; z-index: 20; transition: all 0.2s; }
    #menu-toggle:hover { background: rgba(42,42,74,0.95); color: #fff; border-color: #6a5af9; }
    @media (max-width: 600px) { #title { font-size: 2.2rem; } .map-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); } #stats { flex-direction: column; align-items: center; } }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <script>
    (function(){for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*2+'s';document.getElementById('stars').appendChild(s);}})();
  </script>

  <div id="start-menu">
    <h1 id="title">⚔️ PERSEUS RPG</h1>
    <p id="subtitle">Механический протокол инициализирован...</p>
    <button class="menu-btn" onclick="RPG.startGame()">🗡️ Новая сессия</button>
    <button class="menu-btn secondary" id="continue-btn" onclick="RPG.continueGame()" style="display:none">▶️ Загрузить сессию</button>
    <button class="menu-btn danger" onclick="RPG.resetGame()">🗑️ Сброс данных</button>
  </div>

  <div id="game-ui">
    <button id="menu-toggle" onclick="RPG.showMenu()">⚙️ Меню</button>
    <div id="stats">❤️ HP: <span id="hp">100</span> | 🪙 Золото: <span id="gold">0</span> | ⭐ Ур: <span id="lvl">1</span></div>
    <div id="map-view"><div class="map-grid" id="map-grid"></div></div>
    <div id="event-view"><div id="event-text"></div><div id="event-actions"></div></div>
  </div>

  <!-- 🔗 ПОРЯДОК ПОДКЛЮЧЕНИЯ ВАЖЕН -->
  <script src="data/map.js"></script>
  <script src="engine.js"></script>
</body>
</html>
