<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Герой поневоле — прототип</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a0f08; color: #e6d5b8; margin: 20px; }
        #game { max-width: 700px; margin: auto; border: 3px solid #8b5a2b; padding: 15px; background: #2c1e14; }
        #log { height: 350px; overflow-y: auto; background: #0f0a05; padding: 10px; border: 1px solid #8b5a2b; margin-bottom: 15px; }
        button { margin: 5px; padding: 10px 15px; background: #8b5a2b; color: #e6d5b8; border: none; cursor: pointer; }
        button:hover { background: #a67c52; }
        input { width: 70%; padding: 8px; margin: 5px 0; }
        .npc { color: #ffcc77; }
    </style>
</head>
<body>
    <div id="game">
        <h1>Трактир «У Сгоревшего Дракона»</h1>
        <p><strong>Ты сидишь за стойкой. Голова трещит после вчерашнего. Все вокруг почему-то считают тебя героем.</strong></p>
        
        <div id="log"></div>

        <div>
            <button onclick="lookAround()">Осмотреться</button>
            <button onclick="talkToGrom()">Поговорить с Громом (бармен)</button>
            <button onclick="randomEvent()">Случайное событие</button>
        </div>

        <div id="chatArea" style="display:none; margin-top:15px;">
            <p class="npc"><strong>Гром:</strong> <span id="npcReply"></span></p>
            <input type="text" id="playerInput" placeholder="Что сказать Грому...">
            <button onclick="sendMessageToGrom()">Сказать</button>
            <button onclick="endChat()">Закончить разговор</button>
        </div>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6LTtsvKqsJs3jNajqQCAGMc_Nb8lyCY3jc_FyjyOSGrIw";   // ←←← ВСТАВЬ СВОЙ КЛЮЧ СЮДА
        const MODEL = "gemini-2.5-flash";   // быстрый и достаточно умный в 2026

        let conversationHistory = []; // память диалога

        const systemPrompt = `Ты — Бармен Гром, бывший наёмник, циничный мужик лет 50 с хриплым голосом. 
        Мир — фэнтези с чёрным юмором, как у Пратчетта. Ты не любишь героев, но уважаешь тех, кто хорошо платит или умеет смешно врать. 
        Говоришь коротко, с сарказмом, матерком иногда, но не переигрывай. 
        Отвечай максимум 2–4 предложения.`;

        function addLog(text, className = "") {
            const log = document.getElementById("log");
            const p = document.createElement("p");
            p.innerHTML = text;
            if (className) p.className = className;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        async function askGemini(prompt) {
            if (!API_KEY || API_KEY === "ВАШ_КЛЮЧ_ЗДЕСЬ") {
                addLog("❌ Ключ не вставлен! Замени ВАШ_КЛЮЧ_ЗДЕСЬ на реальный ключ.", "npc");
                return "Магия не сработала...";
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

            const requestBody = {
                contents: [{
                    parts: [{ text: prompt }]
                }],
                generationConfig: {
                    temperature: 0.85,
                    maxOutputTokens: 300
                }
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0]) {
                    return data.candidates[0].content.parts[0].text.trim();
                } else {
                    return "Гром что-то буркнул и отвернулся...";
                }
            } catch (err) {
                console.error(err);
                return "Связь с магией пропала. Попробуй позже.";
            }
        }

        // Действия
        async function lookAround() {
            addLog("<strong>Ты осмотрелся:</strong> Старый трактир, дымно, пахнет пивом и горелым мясом. За стойкой — Гром вытирает кружку. В углу спит какой-то рыцарь в ржавых доспехах.");
        }

        async function randomEvent() {
            addLog("<strong>Случайное событие...</strong>");
            const prompt = `Ты — мастер случайных событий в юмористическом фэнтези. 
            Игрок сидит в трактире. Придумай короткое забавное или глупое событие (взрослый юмор разрешён). 
            1–3 предложения, в повествовательном стиле.`;

            const result = await askGemini(prompt);
            addLog(result);
        }

        // Диалог с Громом
        function talkToGrom() {
            document.getElementById("chatArea").style.display = "block";
            addLog("<span class='npc'><strong>Гром:</strong> Ну чё, «герой», опять нажрался или уже мир спасать собрался?</span>");
            conversationHistory = []; // начинаем новый разговор
        }

        async function sendMessageToGrom() {
            const input = document.getElementById("playerInput");
            const message = input.value.trim();
            if (!message) return;

            addLog(`<strong>Ты:</strong> ${message}`);
            input.value = "";

            conversationHistory.push(`Игрок: ${message}`);

            const fullPrompt = `${systemPrompt}\n\nИстория разговора:\n${conversationHistory.join("\n")}\nГром:`;

            const reply = await askGemini(fullPrompt);
            addLog(`<span class='npc'><strong>Гром:</strong> ${reply}</span>`);

            conversationHistory.push(`Гром: ${reply}`);

            // оставляем только последние 6 реплик
            if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
        }

        function endChat() {
            document.getElementById("chatArea").style.display = "none";
            addLog("<em>Ты отошёл от стойки.</em>");
        }

        // Приветствие при старте
        window.onload = () => {
            addLog("Добро пожаловать в прототип! Нажимай кнопки и пробуй.");
            addLog("Сначала попробуй «Осмотреться» или «Случайное событие».");
        };
    </script>
</body>
</html>
